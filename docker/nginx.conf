# nginx-Konfiguration für den JSONForms Designer (statisches SPA).
# Hinweise: docs/BETRIEB.md

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip für Text-Assets (Monaco-Chunk profitiert deutlich)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Sicherheits-Header (die CSP liegt als <meta> im Build; hier nur Ergänzungen)
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Gehashte Assets dürfen aggressiv gecacht werden
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html nie cachen (sonst bleiben Nutzer auf alten Versionen hängen)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA-Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------------------------------
    # FIM-Portal-Proxy für abgeschottete Netze (CORS/Firewall).
    #
    # Aktivieren: Block einkommentieren UND in der App die FIM-baseUrl auf
    # '/fim-api' stellen (FimApiService({ baseUrl: '/fim-api' })) sowie die
    # CSP-connect-src in packages/app/vite.config.ts auf 'self' reduzieren.
    # -----------------------------------------------------------------------
    # location /fim-api/ {
    #     proxy_pass https://fimportal.de/api/v1/;
    #     proxy_set_header Host fimportal.de;
    #     proxy_ssl_server_name on;
    #     # Antworten sind unkritisch cachebar (öffentliche Stammdaten):
    #     # proxy_cache fim_cache; proxy_cache_valid 200 10m;
    # }
}
