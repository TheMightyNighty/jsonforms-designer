# Kontinuierliche Qualitätssicherung: Lint, Format, Typecheck, Tests, Build
# und Dependency-Audit laufen bei jedem Push auf main und bei jedem PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Formatierung prüfen
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build (editor + app)
        run: npm run build

      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium firefox

      - name: E2E-Smoke-Tests (gegen den Prod-Build)
        run: npm run test:e2e --workspace=packages/app

      - name: Playwright-Report bei Fehlschlag hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7

      - name: Dependency-Audit (production)
        run: npm audit --omit=dev --audit-level=high
